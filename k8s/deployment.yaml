apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-openshift
  namespace: prabha-kathinokkula-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cseoc-app
  template:
    metadata:
      labels:
        app: cseoc-app
    spec:
      containers:
      - name: springboot-container
         image: prabha524/springboot-cse-openshift:latest
        ports:
        - containerPort: 8085